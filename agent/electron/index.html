<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'none'; style-src 'unsafe-inline'; script-src 'self';"
    />
    <title>ChooseYourProtocol Agent</title>
    <style>
      :root {
        --bg: #0c0f16;
        --panel: #141925;
        --panel-2: #1b2230;
        --border: #232b3b;
        --text: #e6ebf2;
        --muted: #8b97ab;
        --accent: #34d3b6;
        --accent-2: #6aa3ff;
        --alert: #ffcf5c;
        --error: #ff6b6b;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        height: 100%;
        background: var(--bg);
        color: var(--text);
        font: 13px/1.45 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          Helvetica, Arial, sans-serif;
      }

      body {
        display: flex;
        flex-direction: column;
      }

      header {
        padding: 14px 16px 10px;
        border-bottom: 1px solid var(--border);
        background: linear-gradient(180deg, #121826, var(--bg));
      }

      header h1 {
        margin: 0;
        font-size: 14px;
        letter-spacing: 0.2px;
      }

      header h1 span {
        color: var(--accent);
      }

      .status {
        margin-top: 6px;
        display: flex;
        align-items: center;
        gap: 8px;
        color: var(--muted);
        font-size: 12px;
      }

      .dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: var(--muted);
        box-shadow: 0 0 0 0 rgba(52, 211, 182, 0.5);
      }
      .dot.ok {
        background: var(--accent);
        animation: pulse 2s infinite;
      }
      .dot.err {
        background: var(--error);
      }

      @keyframes pulse {
        0% {
          box-shadow: 0 0 0 0 rgba(52, 211, 182, 0.45);
        }
        70% {
          box-shadow: 0 0 0 7px rgba(52, 211, 182, 0);
        }
        100% {
          box-shadow: 0 0 0 0 rgba(52, 211, 182, 0);
        }
      }

      main {
        flex: 1;
        overflow-y: auto;
        padding: 12px 14px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
      }

      section h2 {
        margin: 0 0 6px;
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.6px;
        color: var(--muted);
      }

      .card {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 8px 10px;
      }

      .list {
        display: flex;
        flex-direction: column;
        gap: 4px;
        max-height: 150px;
        overflow-y: auto;
      }

      .row {
        display: flex;
        gap: 8px;
        align-items: baseline;
        padding: 3px 0;
        border-bottom: 1px solid rgba(255, 255, 255, 0.03);
      }
      .row:last-child {
        border-bottom: none;
      }

      .time {
        color: var(--muted);
        font-variant-numeric: tabular-nums;
        font-size: 11px;
        flex: 0 0 auto;
      }
      .msg {
        flex: 1;
        word-break: break-word;
      }
      .msg.signal {
        color: var(--accent);
      }
      .msg.knowledge {
        color: var(--accent-2);
      }
      .msg.coordinator {
        color: #c08bff;
      }
      .msg.error {
        color: var(--error);
      }
      .msg.auth {
        color: var(--muted);
      }

      .empty {
        color: var(--muted);
        font-style: italic;
        padding: 4px 0;
      }

      .alert {
        background: linear-gradient(180deg, #2a2410, #1a160a);
        border: 1px solid #4a3d12;
        border-radius: 8px;
        padding: 10px 12px;
        white-space: pre-wrap;
        color: var(--alert);
      }
      .alert .bolt {
        font-weight: 700;
        letter-spacing: 0.4px;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>ChooseYourProtocol <span>Agent</span></h1>
      <div class="status">
        <span id="dot" class="dot"></span>
        <span id="statusText">Starting…</span>
      </div>
    </header>

    <main>
      <section>
        <h2>⚡ Level-up alerts</h2>
        <div id="alerts" class="card">
          <div class="empty">No level-up alerts yet.</div>
        </div>
      </section>

      <section>
        <h2>Knowledge entries</h2>
        <div id="knowledge" class="card list">
          <div class="empty">Waiting for synthesis…</div>
        </div>
      </section>

      <section>
        <h2>Captured signals</h2>
        <div id="signals" class="card list">
          <div class="empty">No signals captured yet.</div>
        </div>
      </section>

      <section>
        <h2>Activity log</h2>
        <div id="log" class="card list">
          <div class="empty">No activity yet.</div>
        </div>
      </section>
    </main>

    <script src="renderer.js"></script>
  </body>
</html>
